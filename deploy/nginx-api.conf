# nginx config для HTTPS-прокси к Express API.
# Поместить в /etc/nginx/sites-available/bot-hh-habr-api,
# затем: ln -s /etc/nginx/sites-{available,enabled}/bot-hh-habr-api && nginx -t && systemctl reload nginx
#
# HTTPS-сертификат через certbot:
#   sudo certbot --nginx -d api.example.com

server {
    listen 80;
    server_name api.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.example.com;

    # certbot заполнит эти строки автоматически
    ssl_certificate     /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;

    # Базовые security-заголовки
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Логи
    access_log /var/log/nginx/bot-hh-habr-api.access.log;
    error_log  /var/log/nginx/bot-hh-habr-api.error.log;

    # Тело запроса небольшое (initData ~ 1KB, settings PATCH ~ 1KB)
    client_max_body_size 64k;

    location /api/ {
        proxy_pass         http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # HH OAuth callback (C0). HH редиректит браузер на /hh/callback?code=...
    # — этот блок нужен, иначе nginx вернёт 404 раньше, чем запрос дойдёт до Express.
    location /hh/ {
        proxy_pass         http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # 404 для всего остального
    location / {
        return 404;
    }
}
